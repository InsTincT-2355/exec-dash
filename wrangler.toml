name = "muriya-executive-dashboard"
compatibility_date = "2026-06-25"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[assets]
directory = "."
exclude = [
  ".env",
  ".env.*",
  ".git/**",
  ".github/**",
  ".vscode/**",
  ".vercel/**",
  ".wrangler/**",
  "coverage/**",
  "dist/**",
  "node_modules/**",
  "*.log",
  "Thumbs.db",
  "Desktop.ini"
]
